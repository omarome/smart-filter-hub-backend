# Server port (Cloud Run / Render provide PORT environment variable)
server.port=${PORT:8080}

# ── SQL migration scripts (run after Hibernate DDL) ─────────────────────────
# Both scripts are idempotent (CREATE IF NOT EXISTS / ON CONFLICT DO NOTHING).
# V3: workspace tables, workspace_memberships, workspace_id FKs, backfill.
# V4: role_audits, record_shares, workspaces.settings column.
spring.sql.init.data-locations=classpath:V3__workspaces.sql,classpath:V4__phase4_polish.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ── Actuator — health endpoint for Cloud Run liveness / Docker HEALTHCHECK ──
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Application name
spring.application.name=query-builder-api

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5174}

# Frontend URL (for redirects after Social Login)
app.frontend.url=${FRONTEND_URL:http://localhost:5174}

# Default Admin Credentials (for initial seeding)
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# PostgreSQL datasource (using environment variables)
# If DB_URL is missing, it falls back to localhost for dev
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/query_builder_db}
spring.datasource.username=${DB_USERNAME:your_username}
spring.datasource.password=${DB_PASSWORD:your_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.cloud.gcp.sql.enabled=false

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# (spring.sql.init.mode and defer-datasource-initialization declared above)

# Logging
logging.level.com.example=INFO
logging.level.org.springframework.web=INFO
# Enable more detailed startup logging if it fails
logging.level.org.springframework.boot.diagnostics=DEBUG

# ── JWT Configuration ────────────────────────────────────────
# Secret key (Base64-encoded, at least 256 bits). 
# Fallback to dev key to prevent "placeholder not resolved" crash, but warn in logs.
app.jwt.secret=${JWT_SECRET}
# Access token expiry: 15 minutes (900000 ms)
app.jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY:900000}
# Refresh token expiry: 7 days (604800000 ms)
app.jwt.refresh-token-expiry-ms=${JWT_REFRESH_EXPIRY:604800000}

# ── OAuth2 (optional — leave blank to disable) ──────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# OAuth2 is now enabled by default. 
# Ensure GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET are set in your environment.

