# Server port (Render provides PORT environment variable)
server.port=${PORT:8080}

# Application name
spring.application.name=query-builder-api

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:${app.cors.allowed-origins:http://localhost:5173}}

# PostgreSQL datasource (using environment variables)
# If DB_URL is missing, it falls back to localhost for dev
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/query_builder_db}
spring.datasource.username=${DB_USERNAME:your_username}
spring.datasource.password=${DB_PASSWORD:your_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.example=INFO
logging.level.org.springframework.web=INFO
# Enable more detailed startup logging if it fails
logging.level.org.springframework.boot.diagnostics=DEBUG

# ── JWT Configuration ────────────────────────────────────────
# Secret key (Base64-encoded, at least 256 bits). 
# Fallback to dev key to prevent "placeholder not resolved" crash, but warn in logs.
app.jwt.secret=${JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3ItZGV2LW9ubHktMjU2Yml0cyE=}
# Access token expiry: 15 minutes (900000 ms)
app.jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY:900000}
# Refresh token expiry: 7 days (604800000 ms)
app.jwt.refresh-token-expiry-ms=${JWT_REFRESH_EXPIRY:604800000}

# ── OAuth2 (optional — leave blank to disable) ──────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Disable auto-configuration of OAuth2 by default (prevents crash if IDs are empty)
# To enable, set OAUTH_EXCLUDE to an empty string in your environment/dashboard.
spring.autoconfigure.exclude=${OAUTH_EXCLUDE:org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration}

